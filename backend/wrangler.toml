#:schema node_modules/wrangler/config-schema.json
name = "solocraft-backend"
main = "src/index.ts"
compatibility_date = "2024-02-22"
compatibility_flags = ["nodejs_compat"]

# Asset Serving
[assets]
directory = "../music-studio-app/dist" # Expo web export default folder
binding = "ASSETS"

# Analytics Engine dataset binding
[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "solocraft_usage"


# D1 Database
[[d1_databases]]
binding = "MY_DB"
database_name = "solocraft-db"
database_id = "cb840dfb-3535-49a3-bb5a-cfee56b36a0a"

# Durable Objects
[[durable_objects.bindings]]
name = "STUDIO_SESSION"
class_name = "StudioSession"

[[migrations]]
tag = "v2"
new_sqlite_classes = ["StudioSession"]

# Workers AI
[ai]
binding = "AI"

# Browser Rendering
[browser]
binding = "MYBROWSER"


# Workflows
[[workflows]]
name = "audio-processing"
binding = "MY_WORKFLOW"
class_name = "AudioWorkflow"

# Secrets Store (Mocked for now, managed via wrangler secret put)
# [vars]
# API_SECRET = "MANAGED_VIA_WRANGLER"
