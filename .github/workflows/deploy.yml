name: Deploy SoloCraft Studio

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-expo:
    name: Build & Deploy Expo Web
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: music-studio-app/package.json

      - name: 📦 Install dependencies
        run: |
          cd music-studio-app
          npm install

      - name: 🚀 Export Expo Web
        run: |
          cd music-studio-app
          npx expo export
        env:
          EXPO_TOKEN: ${{ secrets.EXPO || secrets.EXPO_TOKEN }}

      - name: 🌐 Deploy to Expo Hosting
        run: |
          cd music-studio-app
          npx expo deploy:web --no-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO || secrets.EXPO_TOKEN }}

  deploy-cloudflare:
    name: Build & Deploy Cloudflare Worker
    needs: deploy-expo
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📦 Install Backend dependencies
        run: |
          cd backend
          npm install

      - name: 🚀 Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUD_FLARE || secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.ACCOUNT_ID || secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: 'backend'
          command: deploy
