name: Deploy SoloCraft Studio

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build and Deploy Everything
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: music-studio-app/package.json

      - name: 📦 Install Expo dependencies
        run: |
          cd music-studio-app
          npm install

      - name: 🚀 Export Expo Web
        run: |
          cd music-studio-app
          npx expo export --platform web
        env:
          EXPO_TOKEN: ${{ secrets.EXPO }}

      - name: 📦 Install Backend dependencies
        run: |
          cd backend
          npm install

      - name: 🚀 Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUD_FLARE }}
          accountId: ${{ secrets.ACCOUNT_ID }}
          workingDirectory: 'backend'
          command: deploy
